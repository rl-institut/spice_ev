# call generate_from_simbev script with --help option to see all options
# call generate_from_simbev script with --config option to use this file:
# python generate_from_simbev.py --config examples/generate_from_simbev.cfg

# set output file
output = examples/simbev_scenario.json
# simbev folder
simbev = examples/simbev
# interval from SimBEV in minutes
interval = 15
# minimum allowed state of charge when leaving
min_soc = 0.8
# warn when SoC falls below this threshold in SimBEV simulation
min_soc_threshold = 0.05


# set stationary batteries [capacity, C-Rate]
# battery with capacity = 75 kWh and C-Rate = 0.5
#battery = [[30, 0.5]]
# 2 batteries with capacity = 50 kWh, C-Rate = 1)
#battery = [[50, 1], [50 , 1]]
# unlimited battery capacity with constant (dis)charge of 50 kWh
#battery = [[-1, 50]]

# set CSV-files
# external load timeseries (in this example in same directory as resulting json)
#include_ext_load_csv = load.csv
# options for external load CSV:
# set CSV column name, timestep duration in sec. (example: 10 min) and factor (example: input in W)
#include_ext_csv_option = [["column", "value"], ["step_duration_s", 600], ["factor", 0.001]]

# local feed in timeseries (in this example in subdirectory "timeseries" - relative to resulting json)
#include_feed_in_csv = timeseries/feed_in.csv
# options for feed in CSV:
# set CSV column name, timestep duration in sec. (example: 1 hour) and factor (example: input in kW)
#include_feed_in_csv_option = [["column", "value"], ["step_duration_s", 3600], ["factor", 1]]

# energy price timeseries in EUR/kWh (in this example in parent directory - relative to resulting json)
#include_price_csv = ../energy_price.csv
# options for price CSV: set CSV column name and timestep duration in sec. (example: 6 hours)
#include_price_csv_option = [["column", "value"], ["step_duration_s", 21600]]
# for more options, see https://github.com/rl-institut/spice_ev/wiki/Command-line-options#csv-file-options


# tolerance used for sanity checks, required due to possible rounding differences between simBEV and spiceEV.
eps = 1e-10
